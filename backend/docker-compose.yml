services:
  postgres:
    image: postgres:17-alpine
    container_name: en2h-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Postgres@123
      POSTGRES_DB: en2h_booking

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d en2h_booking" ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: en2h-api
    restart: unless-stopped

    env_file:
      - .env.docker

    ports:
      - "3000:3000"

    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
